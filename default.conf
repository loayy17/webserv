server {
    listen 127.0.0.1:1234;
    server_name localhost;
    root /root/webserv;
    index index.html;
    client_max_body_size 10;

    location / {
        methods GET POST PUT;
        cgi_pass .bla /root/webserv/cgi_tester;
    }

    location /post_body {
        methods POST;
        client_max_body_size 100;
        upload_dir /root/webserv/YoupiBanane/nop;
        cgi_pass .bla /root/webserv/cgi_tester;
    }
    location /directory {
        root /root/webserv/YoupiBanane;
        index youpi.bad_extension;
        methods GET POST; 
        autoindex off;
        cgi_pass .bla /root/webserv/cgi_tester;
        client_max_body_size 1G;
    }
}

